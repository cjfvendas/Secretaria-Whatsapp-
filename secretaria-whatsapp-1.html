<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secretária — WhatsApp</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --green: #25d366;
    --green-dim: #1a9e4a;
    --green-glow: rgba(37,211,102,0.15);
    --text: #f0f0f0;
    --muted: #888;
    --danger: #ff4d4d;
    --warning: #f5a623;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 100px;
  }

  /* Header */
  .header {
    padding: 28px 20px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--green);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    letter-spacing: -0.3px;
  }
  .logo-text span { color: var(--green); }
  .tab-bar {
    display: flex;
    gap: 4px;
    margin-top: 16px;
  }
  .tab {
    flex: 1;
    padding: 8px 0;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    border-radius: 8px;
    cursor: pointer;
    transition: all .2s;
  }
  .tab.active {
    background: var(--green-glow);
    color: var(--green);
    border: 1px solid rgba(37,211,102,0.3);
  }

  /* Pages */
  .page { display: none; padding: 20px; }
  .page.active { display: block; }

  /* Section label */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 16px;
  }

  /* Input */
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: .3px;
  }
  .field input, .field textarea, .field select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border .2s;
    -webkit-appearance: none;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    border-color: var(--green);
  }
  .field textarea { resize: vertical; min-height: 100px; line-height: 1.5; }
  .field select option { background: #1a1a1a; }

  /* Voice button */
  .voice-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .voice-wrap textarea { flex: 1; }
  .btn-mic {
    width: 48px; height: 48px; flex-shrink: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    cursor: pointer;
    transition: all .2s;
    margin-bottom: 0;
  }
  .btn-mic:active { transform: scale(.93); }
  .btn-mic.recording {
    background: rgba(255,77,77,.15);
    border-color: var(--danger);
    animation: pulse-rec 1s ease infinite;
  }
  @keyframes pulse-rec {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,77,77,.4); }
    50% { box-shadow: 0 0 0 8px rgba(255,77,77,0); }
  }

  /* Buttons */
  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all .2s;
  }
  .btn:active { transform: scale(.97); }
  .btn-green {
    background: var(--green);
    color: #0f0f0f;
  }
  .btn-green:hover { background: #20c45a; }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-outline:hover { border-color: var(--green); color: var(--green); }
  .btn-danger {
    background: rgba(255,77,77,.12);
    border: 1px solid rgba(255,77,77,.3);
    color: var(--danger);
  }
  .btn-row { display: flex; gap: 10px; }
  .btn-row .btn { flex: 1; }

  /* Contact row */
  .contact-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border .2s;
  }
  .contact-row:hover { border-color: var(--green); }
  .contact-avatar {
    width: 40px; height: 40px;
    background: var(--green-glow);
    border: 1px solid rgba(37,211,102,.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .contact-info { flex: 1; }
  .contact-name { font-size: 14px; font-weight: 600; }
  .contact-num { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .contact-actions { display: flex; gap: 8px; }
  .icon-btn {
    width: 32px; height: 32px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    cursor: pointer;
    color: var(--muted);
    transition: all .2s;
  }
  .icon-btn:hover { border-color: var(--danger); color: var(--danger); }

  /* Reminder card */
  .reminder-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }
  .reminder-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--green);
    border-radius: 3px 0 0 3px;
  }
  .reminder-card.overdue::before { background: var(--danger); }
  .reminder-card.soon::before { background: var(--warning); }
  .reminder-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }
  .reminder-contact { font-size: 13px; font-weight: 600; color: var(--green); }
  .reminder-time { font-size: 12px; color: var(--muted); }
  .reminder-msg {
    font-size: 14px;
    color: var(--text);
    line-height: 1.45;
    margin-bottom: 12px;
    white-space: pre-wrap;
  }
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  .badge-overdue { background: rgba(255,77,77,.15); color: var(--danger); }
  .badge-soon { background: rgba(245,166,35,.15); color: var(--warning); }
  .badge-scheduled { background: var(--green-glow); color: var(--green); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 14px; line-height: 1.5; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%; transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--green);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show { opacity: 1; }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 0 20px;
    z-index: 20;
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 6px 0;
    cursor: pointer;
    color: var(--muted);
    font-size: 11px;
    font-weight: 500;
    transition: color .2s;
  }
  .nav-item .nav-icon { font-size: 22px; }
  .nav-item.active { color: var(--green); }

  /* Modal overlay */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 50;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px;
    width: 100%; max-width: 480px;
    animation: slideUp .25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    margin-bottom: 20px;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 16px 0;
  }

  .phone-hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Notif permission banner */
  .notif-banner {
    background: rgba(245,166,35,.1);
    border: 1px solid rgba(245,166,35,.3);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--warning);
  }
  .notif-banner button {
    margin-left: auto;
    background: var(--warning);
    color: #0f0f0f;
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">🤖</div>
      <div class="logo-text">Secre<span>tária</span></div>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('enviar')">✉️ Enviar</div>
    <div class="tab" onclick="switchTab('lembretes')">🔔 Lembretes</div>
    <div class="tab" onclick="switchTab('contatos')">👤 Contatos</div>
  </div>
</div>

<!-- PAGE: ENVIAR -->
<div class="page active" id="page-enviar">

  <div id="notif-banner" class="notif-banner" style="display:none">
    🔔 Ative notificações para receber os lembretes
    <button onclick="requestNotifPermission()">Ativar</button>
  </div>

  <div class="card">
    <div class="section-label">Contato</div>
    <div class="field">
      <label>Selecionar contato salvo</label>
      <select id="contact-select" onchange="fillContact()">
        <option value="">— Escolher da lista —</option>
      </select>
    </div>
    <div class="field">
      <label>Ou nome do contato</label>
      <input type="text" id="contact-name" placeholder="Ex: João Silva">
    </div>
    <div class="field">
      <label>Número com DDD e código do país</label>
      <input type="tel" id="contact-phone" placeholder="5511999999999">
      <div class="phone-hint">Apenas números, sem espaços ou traços. Ex: 5511999999999</div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Mensagem</div>
    <div class="field">
      <div class="voice-wrap">
        <textarea id="msg-text" placeholder="Digite a mensagem ou use o microfone 🎤"></textarea>
        <button class="btn-mic" id="mic-btn" onclick="toggleVoice()" title="Gravar voz">🎤</button>
      </div>
    </div>
    <div id="voice-status" style="font-size:12px;color:var(--danger);margin-top:-8px;margin-bottom:8px;display:none">
      🔴 Gravando... Fale agora
    </div>
  </div>

  <div class="card">
    <div class="section-label">Agendar lembrete (opcional)</div>
    <div class="field">
      <label>Data e hora</label>
      <input type="datetime-local" id="schedule-time">
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-outline" onclick="saveReminder()">🔔 Salvar lembrete</button>
    <button class="btn btn-green" onclick="sendNow()">Enviar agora ↗</button>
  </div>

</div>

<!-- PAGE: LEMBRETES -->
<div class="page" id="page-lembretes">
  <div id="reminders-list"></div>
</div>

<!-- PAGE: CONTATOS -->
<div class="page" id="page-contatos">
  <div class="card">
    <div class="section-label">Novo contato</div>
    <div class="field">
      <label>Nome</label>
      <input type="text" id="new-contact-name" placeholder="Nome do contato">
    </div>
    <div class="field">
      <label>Número</label>
      <input type="tel" id="new-contact-phone" placeholder="5511999999999">
      <div class="phone-hint">Apenas números. Ex: 5511999999999</div>
    </div>
    <button class="btn btn-green" onclick="addContact()">+ Adicionar contato</button>
  </div>
  <div id="contacts-list"></div>
</div>

<!-- Modal enviar lembrete -->
<div class="modal-overlay" id="send-modal">
  <div class="modal">
    <div class="modal-title">🔔 Hora de enviar!</div>
    <div id="modal-content"></div>
    <div class="btn-row" style="margin-top:16px">
      <button class="btn btn-outline" onclick="dismissReminder()">Ignorar</button>
      <button class="btn btn-green" id="modal-send-btn">Abrir WhatsApp ↗</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
let contacts = JSON.parse(localStorage.getItem('sec_contacts') || '[]');
let reminders = JSON.parse(localStorage.getItem('sec_reminders') || '[]');
let recognition = null;
let isRecording = false;
let currentReminderModal = null;
let reminderCheckInterval = null;

// ===== INIT =====
function init() {
  renderContacts();
  renderReminders();
  populateContactSelect();
  checkNotifPermission();
  startReminderCheck();
  setMinDateTime();
}

function setMinDateTime() {
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById('schedule-time').min = now.toISOString().slice(0,16);
}

// ===== TABS =====
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  event.target.classList.add('active');
  if (tab === 'lembretes') renderReminders();
  if (tab === 'contatos') renderContacts();
}

// ===== CONTACTS =====
function saveContacts() {
  localStorage.setItem('sec_contacts', JSON.stringify(contacts));
}

function addContact() {
  const name = document.getElementById('new-contact-name').value.trim();
  const phone = document.getElementById('new-contact-phone').value.replace(/\D/g,'');
  if (!name || !phone) { showToast('⚠️ Preencha nome e número'); return; }
  if (phone.length < 10) { showToast('⚠️ Número inválido'); return; }
  const id = Date.now().toString();
  contacts.push({ id, name, phone });
  saveContacts();
  document.getElementById('new-contact-name').value = '';
  document.getElementById('new-contact-phone').value = '';
  renderContacts();
  populateContactSelect();
  showToast('✅ Contato salvo!');
}

function deleteContact(id) {
  contacts = contacts.filter(c => c.id !== id);
  saveContacts();
  renderContacts();
  populateContactSelect();
  showToast('🗑 Contato removido');
}

function renderContacts() {
  const el = document.getElementById('contacts-list');
  if (!contacts.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">👥</div><p>Nenhum contato salvo ainda.<br>Adicione acima para acessar rapidamente.</p></div>`;
    return;
  }
  el.innerHTML = contacts.map(c => `
    <div class="contact-row">
      <div class="contact-avatar">👤</div>
      <div class="contact-info">
        <div class="contact-name">${esc(c.name)}</div>
        <div class="contact-num">+${esc(c.phone)}</div>
      </div>
      <div class="contact-actions">
        <button class="icon-btn" onclick="deleteContact('${c.id}')" title="Remover">🗑</button>
      </div>
    </div>
  `).join('');
}

function populateContactSelect() {
  const sel = document.getElementById('contact-select');
  sel.innerHTML = '<option value="">— Escolher da lista —</option>' +
    contacts.map(c => `<option value="${c.id}">${esc(c.name)} (+${c.phone})</option>`).join('');
}

function fillContact() {
  const id = document.getElementById('contact-select').value;
  if (!id) return;
  const c = contacts.find(x => x.id === id);
  if (!c) return;
  document.getElementById('contact-name').value = c.name;
  document.getElementById('contact-phone').value = c.phone;
}

// ===== SEND NOW =====
function sendNow() {
  const phone = document.getElementById('contact-phone').value.replace(/\D/g,'');
  const msg = document.getElementById('msg-text').value.trim();
  if (!phone) { showToast('⚠️ Informe o número do contato'); return; }
  if (!msg) { showToast('⚠️ Escreva uma mensagem'); return; }
  const url = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
}

// ===== REMINDERS =====
function saveRemindersData() {
  localStorage.setItem('sec_reminders', JSON.stringify(reminders));
}

function saveReminder() {
  const phone = document.getElementById('contact-phone').value.replace(/\D/g,'');
  const name = document.getElementById('contact-name').value.trim();
  const msg = document.getElementById('msg-text').value.trim();
  const time = document.getElementById('schedule-time').value;

  if (!phone) { showToast('⚠️ Informe o número do contato'); return; }
  if (!msg) { showToast('⚠️ Escreva uma mensagem'); return; }
  if (!time) { showToast('⚠️ Selecione data e hora'); return; }

  const scheduled = new Date(time);
  if (scheduled <= new Date()) { showToast('⚠️ Escolha uma data futura'); return; }

  const id = Date.now().toString();
  reminders.push({ id, phone, name: name || phone, msg, time, done: false });
  saveRemindersData();
  showToast('🔔 Lembrete salvo!');
  document.getElementById('schedule-time').value = '';
  scheduleNotification(id, name || phone, msg, scheduled);
}

function deleteReminder(id) {
  reminders = reminders.filter(r => r.id !== id);
  saveRemindersData();
  renderReminders();
  showToast('🗑 Lembrete removido');
}

function markDone(id) {
  const r = reminders.find(x => x.id === id);
  if (r) { r.done = true; saveRemindersData(); renderReminders(); }
}

function renderReminders() {
  const el = document.getElementById('reminders-list');
  const active = reminders.filter(r => !r.done).sort((a,b) => new Date(a.time)-new Date(b.time));
  const done = reminders.filter(r => r.done);

  if (!reminders.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🔔</div><p>Nenhum lembrete agendado.<br>Vá em "Enviar" e salve um lembrete.</p></div>`;
    return;
  }

  const now = new Date();
  let html = '';

  if (active.length) {
    html += `<div class="section-label" style="margin-bottom:12px">PENDENTES (${active.length})</div>`;
    html += active.map(r => {
      const t = new Date(r.time);
      const diff = t - now;
      let cls = '', badge = '';
      if (diff < 0) {
        cls = 'overdue';
        badge = `<span class="badge badge-overdue">⏰ Atrasado</span>`;
      } else if (diff < 3600000) {
        cls = 'soon';
        badge = `<span class="badge badge-soon">⚡ Em breve</span>`;
      } else {
        badge = `<span class="badge badge-scheduled">📅 Agendado</span>`;
      }
      return `
        <div class="reminder-card ${cls}">
          <div class="reminder-header">
            <div class="reminder-contact">👤 ${esc(r.name)}</div>
            <div class="reminder-time">${formatDateTime(t)}</div>
          </div>
          ${badge}
          <div class="reminder-msg">${esc(r.msg)}</div>
          <div class="btn-row">
            <button class="btn btn-danger" style="font-size:13px;padding:10px" onclick="deleteReminder('${r.id}')">🗑 Remover</button>
            <button class="btn btn-green" style="font-size:13px;padding:10px" onclick="openFromReminder('${r.id}')">Abrir WhatsApp ↗</button>
          </div>
        </div>
      `;
    }).join('');
  }

  if (done.length) {
    html += `<hr class="divider"><div class="section-label" style="margin-bottom:12px">ENVIADOS (${done.length})</div>`;
    html += done.slice(-5).reverse().map(r => `
      <div class="reminder-card" style="opacity:.5">
        <div class="reminder-header">
          <div class="reminder-contact">✅ ${esc(r.name)}</div>
          <div class="reminder-time">${formatDateTime(new Date(r.time))}</div>
        </div>
        <div class="reminder-msg" style="font-size:13px">${esc(r.msg)}</div>
        <button class="btn btn-danger" style="font-size:12px;padding:8px" onclick="deleteReminder('${r.id}')">🗑 Remover</button>
      </div>
    `).join('');
  }

  el.innerHTML = html;
}

function openFromReminder(id) {
  const r = reminders.find(x => x.id === id);
  if (!r) return;
  const url = `https://wa.me/${r.phone}?text=${encodeURIComponent(r.msg)}`;
  window.open(url, '_blank');
  r.done = true;
  saveRemindersData();
  renderReminders();
}

// ===== REMINDER CHECK (polling) =====
function startReminderCheck() {
  if (reminderCheckInterval) clearInterval(reminderCheckInterval);
  reminderCheckInterval = setInterval(() => {
    const now = new Date();
    reminders.forEach(r => {
      if (r.done || r.notified) return;
      const t = new Date(r.time);
      if (now >= t) {
        r.notified = true;
        saveRemindersData();
        showReminderModal(r);
      }
    });
  }, 20000); // check every 20s
}

function showReminderModal(r) {
  currentReminderModal = r;
  document.getElementById('modal-content').innerHTML = `
    <div style="font-size:14px;color:var(--muted);margin-bottom:8px">Para: <strong style="color:var(--text)">${esc(r.name)}</strong></div>
    <div style="background:var(--surface2);border-radius:10px;padding:12px;font-size:14px;line-height:1.5;white-space:pre-wrap">${esc(r.msg)}</div>
  `;
  const btn = document.getElementById('modal-send-btn');
  btn.onclick = () => {
    const url = `https://wa.me/${r.phone}?text=${encodeURIComponent(r.msg)}`;
    window.open(url, '_blank');
    r.done = true;
    saveRemindersData();
    renderReminders();
    closeModal();
  };
  document.getElementById('send-modal').classList.add('open');
  // also push notification if permission granted
  if (Notification.permission === 'granted') {
    new Notification('📲 Lembrete — Secretária WhatsApp', {
      body: `Mensagem para ${r.name}: ${r.msg.slice(0,60)}...`,
      icon: 'https://wa.me/favicon.ico'
    });
  }
}

function dismissReminder() {
  if (currentReminderModal) {
    currentReminderModal.done = true;
    saveRemindersData();
    renderReminders();
  }
  closeModal();
}

function closeModal() {
  document.getElementById('send-modal').classList.remove('open');
  currentReminderModal = null;
}

// ===== NOTIFICATIONS =====
function checkNotifPermission() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    document.getElementById('notif-banner').style.display = 'flex';
  }
}

function requestNotifPermission() {
  Notification.requestPermission().then(p => {
    document.getElementById('notif-banner').style.display = 'none';
    if (p === 'granted') showToast('✅ Notificações ativadas!');
  });
}

}

// ===== VOICE =====
function toggleVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showMicHelp('unsupported');
    return;
  }

  // Check if running over file:// (Chrome blocks mic in this case)
  if (location.protocol === 'file:') {
    showMicHelp('file_protocol');
    return;
  }

  if (isRecording) {
    recognition.stop();
    return;
  }

  // First request mic permission explicitly
  navigator.mediaDevices.getUserMedia({ audio: true })
    .then(stream => {
      stream.getTracks().forEach(t => t.stop()); // release, we just needed permission
      startRecognition();
    })
    .catch(err => {
      if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
        showMicHelp('permission');
      } else {
        showMicHelp('generic');
      }
    });
}

function startRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'pt-BR';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('mic-btn').classList.add('recording');
    document.getElementById('voice-status').style.display = 'block';
  };
  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    const ta = document.getElementById('msg-text');
    ta.value = ta.value ? ta.value + ' ' + transcript : transcript;
    showToast('✅ Texto capturado!');
  };
  recognition.onerror = (e) => {
    if (e.error === 'not-allowed') showMicHelp('permission');
    else if (e.error === 'network') showMicHelp('network');
    else if (e.error === 'no-speech') showToast('⚠️ Nenhuma fala detectada. Tente novamente.');
    else showMicHelp('generic');
  };
  recognition.onend = () => {
    isRecording = false;
    document.getElementById('mic-btn').classList.remove('recording');
    document.getElementById('voice-status').style.display = 'none';
  };
  recognition.start();
}

function showMicHelp(type) {
  const msgs = {
    unsupported: `⚠️ Microfone não suportado\n\nUse o Chrome no Android para reconhecimento de voz.`,
    file_protocol: `⚠️ Microfone bloqueado\n\nO Chrome não permite microfone em arquivos locais.\n\n✅ Solução: Abra o arquivo pelo Claude.ai ou hospede em um servidor HTTPS.\n\nPor enquanto, você pode digitar a mensagem normalmente.`,
    permission: `⚠️ Permissão negada\n\nPara ativar:\n1. Toque no 🔒 ou ⓘ na barra de endereço\n2. Toque em "Permissões"\n3. Ative o Microfone\n4. Recarregue a página`,
    network: `⚠️ Erro de rede no microfone\n\nO reconhecimento de voz precisa de internet.\n\nVerifique sua conexão e tente novamente.`,
    generic: `⚠️ Erro no microfone\n\nTente:\n1. Recarregar a página\n2. Verificar permissão do microfone no Chrome\n3. Usar o Chrome atualizado`
  };
  alert(msgs[type] || msgs.generic);
}

// ===== UTILS =====
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDateTime(d) {
  return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit' }) + ' ' +
    d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Close modal on overlay click
document.getElementById('send-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

init();
